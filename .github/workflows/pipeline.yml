name: Indigo BioMed CI/CD Pipeline

#Trigger: run this pipeline whenever code is pushed to the main branch.
#This means every merge from a feature branch triggers a deployment.
on:
  push:
    branches: [main]

jobs: 
  # ----------------------------------------------------------------
  # JOB 1: lint 
  # This job checks code quality. If lint fails, the deploy job NEVER runs.
  # This is the gate that prevents broken code from reaching the server.
  # ----------------------------------------------------------------
  lint:
    name: Code Quality Check 
    runs-on: ubunti-latest # Github spinds up a fresh Ubuntu VM for this job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Downloads the repo code onto the runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
        python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 -r requirements .txt

      - name: Run flake8 lint check
        #flake8 checks Python style and common errors.
        # --max-line-length=120 is relaxed from the default 79 char limit.
        # If any errors are found, this step exits with code 1, failing the job.
        run: flake8 . --count --max-line-length=120 --statistics --exclude=.git,.terraform

  # --------------------------------------------------------------------
  # JOB 2: deploy
  # Only runs if the lint job passed (needs: lint).
  # environment: production adds a manual approval gate.
  # --------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint # This line is what makes deploy wait for lint to pass
    environment: production # This triggers the approval gate you will set up next
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application to EC2 via SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          HOST: ${{ secrets.VM.USER }}
          USER: ${{ secrets.VM_USER }}
        run: |
          # Write the private key to a temp file and restrict permissions.
          # chmod 600 is required - SSH rejects keys that are world-readable.
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # rsync copies the app files to the EC2 instance.
          # --delete removes files on the server that no longer exist locally.
          # -o StrictHostKeyChecking=no skips the 'are you sure?' SSH prompt.
          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./ $USER@$HOST:/home/$USER/indigo-app/

          #SSH in and restart the application.
          #pkill stops any running instance. nohup keeps it running
          # after the SSH session closes. &> redirects output to a log file.
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $USER@$HOST \
            'cd /home/$USER/indigo-app && \
            pip install -r requirements.txt -q && \
            pkill -f app.py || true && \
            nohup python2 app.py &> app.log &'